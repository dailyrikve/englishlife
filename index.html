<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日郵政英文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f6efe3;--paper2:#efe5d4;--ink:#2b2622;--muted:#7d7264;
    --accent:#d2462f;--accent-soft:#f3c9bf;--teal:#2f6f6a;--line:#e0d4bf;--good:#2f7d54;--bad:#c0432e;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;
    background-image:radial-gradient(var(--line) 0.5px,transparent 0.5px);background-size:18px 18px;padding:24px 16px 60px;}
  .wrap{max-width:520px;margin:0 auto;}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
  .brand{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:-0.01em;}
  .brand span{color:var(--accent);}
  .streak{background:var(--accent);color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:500;}
  .tally{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;background:var(--paper2);
    border:1px solid var(--line);border-radius:14px;padding:8px 10px;margin-bottom:18px;}
  .menuBtn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:14px;font-family:inherit;cursor:pointer;color:var(--ink);}
  .menuBtn:hover{background:var(--accent-soft);}
  .daylabel{text-align:center;} .daylabel .big{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  .daylabel .sub{font-size:12px;color:var(--muted);} .topbar .spacer{width:74px;}
  .progress{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:22px;}
  .progress > i{display:block;height:100%;background:var(--teal);width:0;transition:width .4s ease;}
  .card{background:#fffaf0;border:1px solid var(--line);border-radius:20px;padding:28px 24px;
    box-shadow:0 8px 24px rgba(80,60,30,.07);min-height:330px;display:flex;flex-direction:column;}
  .counter{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
  .wordrow{display:flex;align-items:center;gap:14px;}
  .lvtag{font-size:12px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap;line-height:1.4;}
  .lvtag.lv2{background:#eef3f1;color:var(--teal);border:1px solid #cfe0db;}
  .lvtag.lv3{background:#fbeee6;color:#b3502e;border:1px solid #e6c3ab;}
  .word{font-family:'Fraunces',serif;font-size:44px;font-weight:600;line-height:1.05;letter-spacing:-0.02em;}
  .speaker{flex-shrink:0;width:46px;height:46px;border-radius:50%;border:1.5px solid var(--teal);background:#eaf2f1;
    color:var(--teal);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;}
  .speaker:active{transform:scale(.9);}
  .syl{font-family:'Fraunces',serif;font-size:20px;color:var(--teal);margin-top:10px;letter-spacing:.02em;}
  .pos{display:inline-block;font-style:italic;font-family:'Fraunces',serif;color:var(--muted);font-size:15px;margin-top:4px;}
  .zh{font-size:23px;font-weight:500;margin-top:14px;}
  .ex{margin-top:18px;padding-top:14px;border-top:1px dashed var(--line);}
  .ex-toggle{font-size:13px;color:var(--accent);cursor:pointer;user-select:none;}
  .ex-body{margin-top:10px;display:none;} .ex-body.show{display:block;}
  .ex-body .en{font-family:'Fraunces',serif;font-size:18px;line-height:1.5;} .ex-body .ent{font-size:15px;color:var(--muted);margin-top:6px;}
  .ex .en{font-family:'Fraunces',serif;font-size:18px;line-height:1.5;}
  .ex .ent{font-size:15px;color:var(--muted);margin-top:6px;cursor:pointer;}
  .zhmask{filter:blur(6px);} .zhmask:hover{filter:blur(5px);}
  .syn{margin-top:14px;} .synitem{font-size:15px;margin-top:4px;} .synitem b{font-family:'Fraunces',serif;color:var(--teal);}
  .synspk{cursor:pointer;font-size:14px;margin-left:4px;}
  .row{display:flex;gap:10px;margin-top:auto;padding-top:22px;}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.97);} .btn-ghost{background:var(--paper2);color:var(--ink);border:1px solid var(--line);} .btn-main{background:var(--accent);color:#fff;}
  .qhead{font-family:'Fraunces',serif;font-size:30px;font-weight:600;text-align:center;margin:4px 0 2px;line-height:1.3;}
  .qhead.small{font-size:20px;font-family:'Noto Sans TC';font-weight:500;text-align:left;line-height:1.6;}
  .qspeak{text-align:center;margin-bottom:6px;} .qspeak .speaker{display:inline-flex;}
  .qask{text-align:center;color:var(--muted);font-size:14px;margin-bottom:18px;}
  .ctx{background:#f3ece0;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:15px;line-height:1.7;margin-bottom:16px;font-family:'Fraunces',serif;}
  /* 長文閱讀:更舒服的字級與行距、段落間距 */
  .ctx.long{font-size:16.5px;line-height:1.95;padding:18px 16px;}
  .ctx.long p{margin:0 0 12px 0;} .ctx.long p:last-child{margin-bottom:0;}
  .ctx mark{background:#ffe9a8;color:inherit;padding:1px 2px;border-radius:3px;box-shadow:0 0 0 1px #f3d77a;}
  .ctxtools{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
  .ctxtools .btn{font-size:13px;padding:9px 12px;width:100%;}
  .glossbox{margin-top:10px;border-top:1px dashed var(--line);padding-top:6px;font-family:'Noto Sans TC',sans-serif;display:none;}
  .glossbox.show{display:block;}
  .glossbox .ttl{font-size:12px;color:var(--teal);font-weight:700;margin:2px 0 4px;}
  .glossbox .gl{display:flex;justify-content:space-between;align-items:baseline;gap:14px;padding:6px 2px;border-bottom:1px solid #eadfce;}
  .glossbox .gl:last-child{border-bottom:none;}
  .glossbox .gl-l{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .glossbox .gl b{font-family:'Fraunces',serif;font-size:16.5px;}
  .glossbox .gl-syl{font-family:'Fraunces',serif;font-style:italic;color:var(--teal);font-size:13px;}
  .glossbox .gl-pos{font-style:italic;color:#a89878;font-size:12.5px;}
  .glossbox .glspk{cursor:pointer;font-size:14px;}
  .glossbox .gl-zh{color:#6b5d4a;font-size:14px;text-align:right;flex-shrink:0;}
  .ctxzh{display:none;margin-top:10px;font-family:'Noto Sans TC',sans-serif;text-align:left;line-height:1.85;color:#5a5148;}
  .ctxzh.show{display:block;}
  /* 連貫克漏字:空格 token */
  .blk{display:inline-block;min-width:34px;text-align:center;border-bottom:2px solid var(--muted);color:var(--muted);font-size:13px;padding:0 6px;margin:0 2px;vertical-align:baseline;font-family:'Noto Sans TC',sans-serif;}
  .blk.cur{border-bottom:2px solid var(--teal);background:#dff0ee;color:var(--teal);font-weight:700;border-radius:5px 5px 0 0;}
  .blk.filled{border-bottom:2px solid var(--ok,#2e7d57);color:var(--ok,#2e7d57);font-weight:700;font-family:'Fraunces',serif;}
  /* 課外讀物:對話氣泡情境 */
  .story{background:linear-gradient(180deg,#fbf3e7,#f7ede0);border:1px solid #ecddc6;border-radius:16px;padding:18px 16px 20px;margin-bottom:16px;font-family:'Fraunces',serif;}
  .story .scene{font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:.1em;color:#b08948;text-align:center;margin-bottom:6px;text-transform:uppercase;}
  .story .shint{font-family:'Noto Sans TC',sans-serif;font-size:12px;color:#a98a5e;text-align:center;margin-bottom:14px;}
  .story .para{margin:0 0 13px;line-height:1.95;font-size:16.5px;}
  .story .para.n{color:#5f5240;}
  .story .para.d{padding:2px 0 2px 13px;border-left:3px solid #cfc0a6;}
  .story .para.d.tony{border-left-color:#cf8f5e;}
  .story .para.d.steve{border-left-color:#5e8fa8;}
  .story .para .who{display:block;font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:.04em;color:#9c8a6e;margin-bottom:1px;opacity:.85;}
  .story .para.d.tony .who{color:#b9743f;} .story .para.d.steve .who{color:#477287;}
  .story .sent{cursor:pointer;border-radius:4px;padding:0 1px;transition:background .12s;}
  .story .sent:hover{background:#f1e7d4;}
  .story .sent.tapped{background:#fbeec9;text-decoration:underline;text-decoration-color:#d9b676;text-underline-offset:3px;}
  .story .sentzh{display:none;font-family:'Noto Sans TC',sans-serif;font-size:13.5px;color:#7a6a52;background:#fbeec9;border-radius:5px;padding:1px 7px;margin:0 2px;}
  .story .sentzh.show{display:inline;}
  .card.storymode{background:#fff8ef;}
  /* 關卡列表類型標牌 */
  .rtag{display:inline-block;font-family:'Noto Sans TC',sans-serif;font-size:11px;padding:1px 8px;border-radius:999px;margin-top:4px;}
  .rtag.read{background:#e8eef0;color:#3f6b73;} .rtag.cloze{background:#efe7f3;color:#6b4f7a;} .rtag.fun{background:#fcefd8;color:#a9762e;}
  .opt{display:block;width:100%;text-align:left;background:#fffaf0;border:1.5px solid var(--line);border-radius:12px;
    padding:13px 15px;margin-bottom:10px;font-size:16px;font-family:inherit;cursor:pointer;transition:.15s;}
  .opt:hover{border-color:var(--teal);} .opt.correct{border-color:var(--good);background:#e7f3ea;} .opt.wrong{border-color:var(--bad);background:#f7e3df;} .opt:disabled{cursor:default;}
  .fillrow{text-align:center;margin:10px 0 4px;} .fillmask{font-family:'Fraunces',serif;font-size:34px;letter-spacing:4px;}
  .fillin{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:14px;font-size:20px;font-family:'Fraunces',serif;text-align:center;margin-top:14px;}
  .fillin:focus{outline:none;border-color:var(--teal);}
  .feedback{margin-top:14px;font-size:15px;line-height:1.6;padding:12px;border-radius:10px;display:none;}
  .feedback.show{display:block;} .feedback.ok{background:#e7f3ea;color:var(--good);} .feedback.no{background:#f7e3df;color:var(--bad);}
  /* 文法題:答完後分開列出整句中文意思 */
  .qzh{margin-top:12px;padding-top:10px;border-top:1px dashed rgba(120,90,40,.28);}
  .qzh-h{font-size:11px;letter-spacing:.06em;color:var(--muted);margin-bottom:5px;}
  .qzh-en{font-family:'Fraunces',serif;font-size:16px;line-height:1.5;color:var(--ink);}
  .qzh-zh{font-size:14.5px;margin-top:4px;color:var(--ink);}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:28px;letter-spacing:.05em;}
  .errbox{background:#f7e3df;border:1px solid var(--bad);border-radius:14px;padding:20px;color:#7a2417;line-height:1.6;font-size:14px;}
  /* 形近字對比 */
  .conf{margin-top:14px;background:#fbf2ec;border:1px solid var(--accent-soft);border-radius:12px;padding:12px 14px;}
  .conf-h{font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;}
  .conf-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
  .conf-w{font-family:'Fraunces',serif;font-size:21px;min-width:104px;color:var(--ink);}
  .conf-zh{font-size:14px;color:var(--muted);flex:1;}
  .dchar{color:var(--accent);font-weight:700;border-bottom:2px solid var(--accent);}
  .confspk{cursor:pointer;font-size:15px;flex-shrink:0;}
  .disc{margin-top:12px;padding-top:10px;border-top:1px dashed var(--bad);}
  .disc-h{font-size:12px;margin-bottom:6px;color:var(--bad);}
  .disc-row{display:flex;align-items:center;gap:9px;margin-top:5px;}
  .disc-w{font-family:'Fraunces',serif;font-size:21px;color:var(--ink);min-width:104px;}
  .disc-zh{color:var(--muted);font-size:14px;flex:1;}
  /* 四選一答完:各選項中文對照 */
  .optzh{margin-top:10px;padding-top:8px;border-top:1px dashed var(--line);}
  .optzh-row{display:flex;align-items:center;gap:9px;padding:3px 0;color:var(--muted);}
  .optzh-en{font-family:'Fraunces',serif;font-size:18px;min-width:104px;color:#8a7c68;}
  .optzh-zh{font-size:14px;flex:1;}
  .optzh-row.ans .optzh-en,.optzh-row.ans .optzh-zh{color:var(--accent);font-weight:600;}
  /* 找訊號字 chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
  .chip{font-family:'Fraunces',serif;font-size:17px;padding:8px 13px;border:1px solid var(--line);border-radius:10px;background:#fffaf0;cursor:pointer;color:var(--ink);}
  .chip:disabled{cursor:default;opacity:.85;}
  .chip.correct{background:#e7f3ec;border-color:var(--good);color:#1c6b3f;}
  .chip.wrong{background:#f7e3df;border-color:var(--bad);color:#7a2417;}
  /* 對比階梯 */
  .clad{margin-top:16px;background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .clad-h{font-size:12px;color:var(--teal);margin-bottom:8px;}
  .clad-stem{font-family:'Fraunces',serif;font-size:19px;line-height:1.6;text-align:center;}
  .cslot{color:var(--accent);font-weight:700;border-bottom:2px solid var(--accent);padding:0 3px;}
  .cslot.wrong{color:var(--bad);border-bottom:2px solid var(--bad);text-decoration:line-through;}
  .cbtns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px;}
  .cbtn{font-family:inherit;font-size:14px;padding:7px 13px;border:1px solid var(--accent-soft);border-radius:999px;background:#fffaf0;cursor:pointer;color:var(--ink);}
  .cbtn.bad{border-color:#e6b3a8;color:var(--bad);}
  .cbtn.on{background:var(--good);color:#fff;border-color:var(--good);}
  .cbtn.bad.on{background:var(--bad);color:#fff;border-color:var(--bad);}
  .cnote{text-align:center;font-size:16px;color:var(--ink);margin-top:12px;min-height:1.3em;font-weight:500;}
  .cnote.ok{color:var(--good);} .cnote.bad{color:var(--bad);}
  /* 動詞變化表 */
  .vforms{margin-top:14px;background:#eef3f1;border:1px solid #cfe0db;border-radius:12px;padding:12px 10px;}
  .vf-h{font-size:12px;color:var(--teal);text-align:center;margin-bottom:9px;}
  .vf-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
  .vf{display:flex;flex-direction:column;align-items:center;min-width:74px;padding:7px 9px;background:#fffaf0;border:1px solid var(--line);border-radius:9px;}
  .vf b{font-family:'Fraunces',serif;font-size:17px;color:var(--ink);}
  .vf small{font-size:11px;color:var(--muted);margin-top:3px;}
  .vf-note{font-size:12.5px;color:var(--teal);text-align:center;margin-top:10px;line-height:1.5;}
  /* home */
  .cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .catcard{border:1.5px solid var(--line);background:#fffaf0;border-radius:16px;padding:18px 14px;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink);transition:.12s;}
  .catcard:hover{border-color:var(--teal);} .catcard .ic{font-size:26px;} .catcard .nm{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:6px;}
  .catcard .ds{font-size:12px;color:var(--muted);margin-top:2px;} .catcard .pr{font-size:12px;color:var(--teal);margin-top:8px;font-weight:500;}
  .catcard.locked{opacity:.55;} .catcard.locked .pr{color:var(--muted);}
  /* category screen */
  .resume{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;width:100%;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;}
  .hint{background:#eaf2f1;border:1px solid #cfe2df;color:#2c5b57;border-radius:12px;padding:11px 14px;font-size:13px;margin:14px 0 18px;line-height:1.5;}
  .setting{margin:4px 0 18px;} .setting .lab{font-size:13px;color:var(--muted);margin-bottom:8px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;} .chip{border:1.5px solid var(--line);background:#fffaf0;border-radius:20px;padding:6px 13px;font-size:14px;font-family:inherit;cursor:pointer;color:var(--ink);} .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .menu-title{font-size:13px;color:var(--muted);margin:6px 0 10px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .daycell{position:relative;border:1.5px solid var(--line);background:#fffaf0;border-radius:14px;padding:13px 6px;text-align:center;cursor:pointer;font-family:inherit;transition:.12s;}
  .daycell:hover{border-color:var(--teal);} .daycell .dn{font-family:'Fraunces',serif;font-size:16px;font-weight:600;} .daycell .st{font-size:11px;color:var(--muted);margin-top:3px;}
  .daycell.done{background:#e7f3ea;border-color:#a8d3ba;} .daycell.done .st{color:var(--good);} .daycell .todaytag{position:absolute;top:-8px;right:-6px;background:var(--teal);color:#fff;font-size:10px;border-radius:10px;padding:1px 7px;}
  .daycell .advbadge{position:absolute;top:-8px;left:-6px;background:#fbeee6;color:#b3502e;border:1px solid #e6c3ab;font-size:10px;font-weight:600;border-radius:10px;padding:1px 7px;}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="brand">每日<span>郵政</span>英文</div><div class="streak" id="streak"></div></header>
  <div class="tally" id="tally"></div>
  <div class="topbar" id="topbar" style="display:none;">
    <button class="menuBtn" id="menuBtn">&#9776; 目錄</button>
    <div class="daylabel"><div class="big" id="dayBig"></div><div class="sub" id="daySub"></div></div>
    <span class="spacer"></span>
  </div>
  <div class="progress" id="progress" style="display:none;"><i id="bar"></i></div>
  <div class="card" id="card"></div>
  <div class="note">© Celia</div>
</div>

<script>
const DEFAULT_WPD=8, DAY_OPTIONS=[6,8,10,12,15], EXAM_ROUNDS=3, DEFAULT_SPRINT_N=20, SPRINT_OPTIONS=[10,15,20,25];
const DEFAULT_GSPRINT_N=15, GSPRINT_OPTIONS=[10,15,20,25]; // 文法衝刺題數(比照單字衝刺;預設 15)
const CATS=[
  {key:"vocab",name:"單字",ic:"📦",ds:"核心高頻字"},
  {key:"grammar",name:"文法",ic:"🔧",ds:"常考句型"},
  {key:"reading",name:"閱讀",ic:"📖",ds:"短文與克漏字"},
  {key:"exam",name:"模擬考",ic:"📝",ds:"綜合實戰"},
  {key:"sprint",name:"單字衝刺",ic:"⚡",ds:"每天實戰,錯字優先"},
  {key:"gsprint",name:"文法衝刺",ic:"🧩",ds:"句型實戰,錯題優先"}
];
let ALL=[], GRAMMAR=[], READING=[];
let EXAM=null; // 模擬考整卷(exam.json);載入失敗為 null → 退回即時組卷
let DAYS=[];
const ONE_DAY=86400000;
let state={startDate:null,wordsPerDay:DEFAULT_WPD,sprintN:DEFAULT_SPRINT_N,gsprintN:DEFAULT_GSPRINT_N,progress:{vocab:{},grammar:{},reading:{},exam:{},sprint:{},gsprint:{}}};
let phase="home", curCat=null, viewLevel=0, learnIdx=0;
let quizQ=[], quizIdx=0, quizScore=0, quizCtx=null, quizCtxZh=null, quizCtxGloss=null, quizGenre=null, quizStory=false, quizStoryData=null, quizCloze=false, quizFill={}, answered=false;
let sprintWrong=[];
let gramSprintWrong=[]; // 文法衝刺本回答錯的句型(供完成畫面列出)
const STORE_KEY="dailyEnglishState_v2";

function loadState(){
  try{const s=localStorage.getItem(STORE_KEY);if(s)state=Object.assign(state,JSON.parse(s));}catch(e){}
  if(!state.startDate)state.startDate=Date.now();
  if(!state.wordsPerDay)state.wordsPerDay=DEFAULT_WPD;
  if(!state.sprintN)state.sprintN=DEFAULT_SPRINT_N;
  if(!state.gsprintN)state.gsprintN=DEFAULT_GSPRINT_N;
  if(!state.progress)state.progress={vocab:{},grammar:{},reading:{},exam:{},sprint:{},gsprint:{}};
  for(const c of CATS)if(!state.progress[c.key])state.progress[c.key]={}; // 舊存檔自動補上 gsprint:{} 等缺漏欄位
  saveState();
}
function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function speak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.85;speechSynthesis.speak(u);}catch(e){}}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}
function normalize(d){return (Array.isArray(d)&&d.length&&Array.isArray(d[0]))?d.flat():d;}

// ===== 形近字偵測(編輯距離)=====
function editDist(a,b){const m=a.length,n=b.length;const dp=Array.from({length:m+1},()=>new Array(n+1).fill(0));
  for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return dp[m][n];}
let CONF_CACHE=null;
function buildConfCache(){CONF_CACHE={};
  for(const w of ALL){const en=w.en.toLowerCase();const near=[];
    if(!/^[a-z]+$/.test(en)){CONF_CACHE[w.en]=near;continue;} // 跳過片語
    for(const o of ALL){if(o.en===w.en)continue;const oe=o.en.toLowerCase();
      if(/^[a-z]+$/.test(oe)&&Math.abs(oe.length-en.length)<=1&&editDist(en,oe)<=1)near.push(o);}
    CONF_CACHE[w.en]=near;}}
function confusables(en){if(!CONF_CACHE)buildConfCache();return CONF_CACHE[en]||[];}
// 把 a 相對於 b 的「不同字母」標紅,共同部分維持原色 → 讓考生看清差在哪
function diffParts(a,b){let p=0;while(p<a.length&&p<b.length&&a[p]===b[p])p++;
  let s=0;while(s<a.length-p&&s<b.length-p&&a[a.length-1-s]===b[b.length-1-s])s++;
  return [a.slice(0,p),a.slice(p,a.length-s),a.slice(a.length-s)];}
function diffHL(a,b){const[p,c,s]=diffParts(a.toLowerCase(),b.toLowerCase());
  return p+(c?'<u class="dchar">'+c+'</u>':'')+s;}
// 答錯時:若選項與正解是形近的單字,組一張並排辨別小卡
function discrimHTML(answer,picked){
  if(!picked||picked===answer)return "";
  const wa=ALL.find(x=>x.en===answer),wp=ALL.find(x=>x.en===picked);
  if(!wa||!wp)return ""; // 只有兩個都是單字(非文法/閱讀選項)才比對
  if(editDist(answer.toLowerCase(),picked.toLowerCase())>2)return "";
  return '<div class="disc"><div class="disc-h">這兩個字長很像,看清楚差別:</div>'
    +'<div class="disc-row"><span class="disc-w">'+diffHL(wp.en,wa.en)+'</span><span class="disc-zh">'+wp.zh+'(你選的)</span><span class="confspk" data-en="'+wp.en+'">🔊</span></div>'
    +'<div class="disc-row"><span class="disc-w">'+diffHL(wa.en,wp.en)+'</span><span class="disc-zh">'+wa.zh+'(正解)</span><span class="confspk" data-en="'+wa.en+'">🔊</span></div></div>';}

// ===== 文法:找訊號字 / 對比階梯 (皆為選填欄位,沒有就略過)=====
// 由 it.signal + it.ex 組出「點出關鍵字」題;訊號字可為片語,會自動合併成一個 chip
function buildSignalQ(it){
  if(!it.signal||!it.ex)return null;
  const toks=it.ex.split(/\s+/);
  const norm=s=>s.toLowerCase().replace(/[^a-z]/g,"");
  const sig=norm(it.signal);if(!sig)return null;
  for(let i=0;i<toks.length;i++){
    let acc="",j=i;
    while(j<toks.length){const add=norm(toks[j]);if(add===""||!sig.startsWith(acc+add))break;acc+=add;j++;if(acc===sig)break;}
    if(acc===sig){
      const chips=[];let ai=-1;
      for(let k=0;k<toks.length;){if(k===i){chips.push(toks.slice(i,j).join(" "));ai=chips.length-1;k=j;}else{chips.push(toks[k]);k++;}}
      return {kind:"signal",head:"",chips,answerIdx:ai,answer:toks.slice(i,j).join(" "),
        ask:"先找關鍵字:點出這句裡決定要用哪種文法的字",
        note:it.signalNote||("「"+it.signal+"」是判斷的關鍵字。")};
    }
  }
  return null;
}
function contrastHTML(c){
  if(!c||!Array.isArray(c.items)||!c.items.length)return "";
  const lab=x=>x.label||x.form||(Array.isArray(x.fills)?x.fills.find(v=>v):"")||"";
  const hasBad=c.items.some(x=>x.ok===false);
  const btns=c.items.map((x,i)=>{const bad=x.ok===false;
    return '<button class="cbtn'+(bad?' bad':'')+'" data-i="'+i+'">'+(bad?'✗ ':'')+lab(x)+'</button>';}).join("");
  const head=hasBad?'比比看 — 換一個字看差別;紅色 ✗ 的不能這樣用'
                   :'比比看 — 拿上面那句,換掉一個字,看中文怎麼變';
  return '<div class="clad"><div class="clad-h">'+head+'</div>'
    +'<div class="clad-stem" id="cstem"></div><div class="cbtns">'+btns+'</div><div class="cnote" id="cnote"></div></div>';
}
// 動詞變化表(選填):四種樣子 原形/加s/過去/-ing,至少要有2種才顯示
// 表格下方註解=選填、按需顯示:
//   有 baseNote → 顯示「複數用原形 vs 單數+s」對比(只給現在簡單式這種真的吃 +s 規則的句型)
//   否則有 subjNote → 顯示該自訂說明
//   兩者都沒有 → 不顯示註解(避免在過去式/被動/非謂語等句型誤掛「+s」提示)
function vformsHTML(f){
  if(!f)return "";
  const rows=[["base","原形"],["s","他/她/它+s"],["past","過去"],["ing","-ing(進行)"]].filter(([k])=>f[k]);
  if(rows.length<2)return "";
  const labOf=(k,lab)=>(k==="base"&&f.baseNote)?(lab+'<i style="font-style:normal;color:var(--teal)"> '+f.baseNote+'</i>'):lab;
  let note="";
  if(f.baseNote){
    note='<div class="vf-note"><b>'+f.baseNote+'</b>(含複數)動詞用<b>原形</b>;只有<b>單數</b>的他/她/它才加 <b>s</b>'+(f.subjNote?(';'+f.subjNote):'')+'</div>';
  }else if(f.subjNote){
    note='<div class="vf-note">'+f.subjNote+'</div>';
  }
  return '<div class="vforms"><div class="vf-h">這個動詞的幾種樣子</div><div class="vf-row">'
    +rows.map(([k,lab])=>'<span class="vf"><b>'+f[k]+'</b><small>'+labOf(k,lab)+'</small></span>').join("")+'</div>'+note+'</div>';
}
// 文法分關:有 family 就依家族分組(每族一關),否則退回每 3 條一關
let GRAM_LV=null;
function gramLevels(){
  if(GRAM_LV)return GRAM_LV;
  if(GRAMMAR.some(g=>g&&g.family)){
    const order=[],map={};
    for(const g of GRAMMAR){const f=g.family||"其他";if(!map[f]){map[f]=[];order.push(f);}map[f].push(g);}
    GRAM_LV=order.map(f=>map[f]);
  }else{GRAM_LV=[];for(let i=0;i<GRAMMAR.length;i+=3)GRAM_LV.push(GRAMMAR.slice(i,i+3));}
  return GRAM_LV;
}
// 題庫:有 qbank 就用題庫,否則退回單一 q;每題需有 options 陣列
function gramBank(it){
  const bank=(Array.isArray(it.qbank)&&it.qbank.length)?it.qbank:[{q:it.q,options:it.options,answer:it.answer,note:it.note}];
  return bank.filter(x=>x&&Array.isArray(x.options)&&x.options.length&&x.answer);
}
function gramFormQ(qq){return {kind:"choice",head:qq.q,headSmall:true,ask:"選出正確答案",options:shuffle(qq.options.slice()),answer:qq.answer,note:qq.note,qZh:qq.qZh};}
// 答完後的「整句意思」小卡:把題目空格填入正解,並附整句中文(資料有 qZh 才顯示)
function gramSentenceHTML(q){
  if(!q||!q.qZh)return "";
  const en=/_{2,}/.test(q.head)?q.head.replace(/_{2,}/,'<b style="color:var(--accent)">'+q.answer+'</b>'):q.head;
  return '<div class="qzh"><div class="qzh-h">整句意思</div><div class="qzh-en">'+en+'</div><div class="qzh-zh">'+q.qZh+'</div></div>';
}


function rechunk(){DAYS=[];const w=state.wordsPerDay;for(let i=0;i<ALL.length;i+=w)DAYS.push(ALL.slice(i,i+w));}

// 閱讀單元的關卡:只收「短文閱讀(reading)」與「連貫克漏字(passagecloze)」。
// 孤立單句 cloze 不再列為關卡(已被單字進階關＋單字衝刺涵蓋),但資料保留給 exam 大類抽用。
function readingLevels(){return READING.filter(r=>r.type==="reading"||r.type==="passagecloze");}
// 每個大類有幾關
function levelCount(cat){
  if(cat==="vocab")return DAYS.length;
  if(cat==="grammar")return gramLevels().length;
  if(cat==="reading")return readingLevels().length;
  if(cat==="exam"){if(EXAM&&EXAM.rounds.length)return EXAM.rounds.length; // 有整卷:每回=一關
    return (ALL.length&&GRAMMAR.length)?EXAM_ROUNDS:0;} // 後備:即時組卷
  if(cat==="sprint")return ALL.length?1:0; // 衝刺沒有關卡;回傳非 0 只為了讓首頁卡片不被當「準備中」
  if(cat==="gsprint")return GRAMMAR.length?1:0; // 文法衝刺同理,不走 level 計數
  return 0;
}
function doneCount(cat){ // 只計入目前實際存在的關卡(避免縮減關卡後,舊存檔的孤兒關號灌大數字)
  const p=state.progress[cat]||{},n=levelCount(cat);
  let c=0;for(let i=0;i<n;i++)if(p["L"+i])c++;return c;
}
function currentLevel(cat){ // 第一個還沒完成的關卡
  const n=levelCount(cat);for(let i=0;i<n;i++)if(!state.progress[cat]["L"+i])return i;return n;
}
// 單字關卡的題型:前段選中文→中段拼字母→後段選英文
function vocabFmt(i){return i<2?"zh":i<4?"en":i<6?"fillp":"fillf";}
// 第7關起改為「綜合」:同一關內四種題型(選中文/選英文/補字母/拼全字)輪流,避免後段一路只有拼全字
function vocabMixed(i){return i>=6;}
function vocabQFmt(level,j){return vocabMixed(level)?["zh","en","fillp","fillf"][j%4]:vocabFmt(level);}
// 該關是否以進階字(level>=2)為主 → 首頁關卡格標「進階」(依實際單字判斷,自動適應每日字數)
function vocabAdv(i){const set=DAYS[i];if(!set||!set.length)return false;
  return set.filter(w=>(w.level||1)>=2).length*2>set.length;}
function vocabFmtLabel(i){if(vocabAdv(i))return "例句填空";if(vocabMixed(i))return "綜合";const f=vocabFmt(i);return f==="zh"?"選中文":f==="en"?"選英文":f==="fillp"?"補字母":"拼全字";}
function fmtHint(cat,i){
  if(i>=levelCount(cat))return "這個大類已全部完成,可回去複習任何一關。";
  if(cat==="vocab"){if(vocabAdv(i))return "考題式例句填空:先 2 題拼字暖身,再看英文句子從同詞性的字裡選出最適合填入空格的;答完看整句中文。";if(vocabMixed(i))return "綜合題:選中文、選英文、補字母、拼全字輪流出現,模擬實戰。";const f=vocabFmt(i);return f==="zh"?"看英文,選出正確的中文意思。":f==="en"?(i>=3?"進階:從長得很像的英文裡選出正確的字。":"看中文,從幾個英文裡選出正確的字。"):f==="fillp"?"聽發音,把單字缺少的字母補上。":"聽發音,把整個單字拼出來。";}
  if(cat==="grammar")return "看句型卡和對比例句,先找出關鍵字,再選出正確用法。";
  if(cat==="reading"){const it=readingLevels()[i];if(it&&it.type==="passagecloze")return "連貫克漏字:讀整段短文,依上下文選最適合填入每個空格的字(文法＋單字混合,比照考古題)。";return "先熟悉關鍵字,再讀短文;答完每題會給中文解析與『答案在文章哪一句』。";}
  if(cat==="exam")return "各種題型混合的小考,練習絕不留白、先刪再猜。";
  return "";
}

async function fetchJSON(name){const r=await fetch(name,{cache:"no-store"});if(!r.ok)throw new Error(name+" "+r.status);return r.json();}
async function init(){
  loadState();
  try{ALL=normalize(await fetchJSON("data.json"));if(!Array.isArray(ALL)||!ALL.length)throw new Error("空");}
  catch(e){document.getElementById("card").innerHTML='<div class="errbox"><b>讀不到 data.json</b><br>'+e.message+'<br><br>請確認 data.json 與本網頁放在同一層,並透過 https 網址開啟。</div>';return;}
  try{GRAMMAR=await fetchJSON("grammar.json");}catch(e){GRAMMAR=[];}
  try{READING=await fetchJSON("reading.json");}catch(e){READING=[];}
  // 模擬考整卷:獨立 try/catch,載入失敗只讓 EXAM=null(退回即時組卷),不影響其他資料
  try{const ex=await fetchJSON("exam.json");EXAM=(ex&&Array.isArray(ex.rounds)&&ex.rounds.length)?ex:null;}catch(e){EXAM=null;}
  rechunk();phase="home";render();
}

function chrome(){
  const home=(phase==="home");
  document.getElementById("topbar").style.display=home?"none":"flex";
  document.getElementById("progress").style.display=(phase==="learn"||phase==="quiz")?"block":"none";
  let totDone=0;for(const c of CATS){if(c.key.endsWith("sprint"))continue;totDone+=doneCount(c.key);} // sprint / gsprint 皆不計關
  document.getElementById("streak").textContent="完成 "+totDone+" 關";
  let learned=0;for(const k in state.progress.vocab){const i=parseInt(k.replace("L",""));if(DAYS[i])learned+=DAYS[i].length;}
  document.getElementById("tally").textContent="累積認得 "+learned+" 個單字";
  if(!home){
    const cn=CATS.find(c=>c.key===curCat);
    document.getElementById("dayBig").textContent=(phase==="cat")?cn.name:(curCat.endsWith("sprint")?cn.name:(cn.name+" · 第 "+(viewLevel+1)+" 關"));
    document.getElementById("daySub").textContent=phase==="quiz"?"作答中":(phase==="done"||phase==="sprintDone"||phase==="gsprintDone")?"完成":(phase==="sprintSetup"||phase==="gsprintSetup")?"選題數":phase==="learn"?"學習":("共 "+levelCount(curCat)+" 關");
    if(phase==="learn"||phase==="quiz"){
      let pct=phase==="learn"?(DAYS[viewLevel]?learnIdx/DAYS[viewLevel].length*50:0):(quizQ.length?50+quizIdx/quizQ.length*50:50);
      document.getElementById("bar").style.width=pct+"%";
    }
  }
}
function render(){chrome();
  if(phase==="home")renderHome();
  else if(phase==="cat")renderCat();
  else if(phase==="learn")renderLearn();
  else if(phase==="quiz")renderQuiz();
  else if(phase==="done")renderDone();
  else if(phase==="sprintDone")renderSprintDone();
  else if(phase==="sprintSetup")renderSprintSetup();
  else if(phase==="gsprintDone")renderGramSprintDone();
  else if(phase==="gsprintSetup")renderGramSprintSetup();
}

function renderHome(){
  let html='<div class="cats">';
  for(const c of CATS){
    const n=levelCount(c.key),locked=n===0;
    let pr;
    if(c.key==="sprint"){const np=Object.keys(state.progress.sprint||{}).length;pr=locked?'準備中':(np?('已練 '+np+' 字'):'點我開始');}
    else if(c.key==="gsprint"){const np=Object.keys(state.progress.gsprint||{}).length;pr=locked?'準備中':(np?('已練 '+np+' 句型'):'點我開始');}
    else{pr=locked?'準備中':('完成 '+doneCount(c.key)+' / '+n+' 關');}
    html+=`<button class="catcard ${locked?'locked':''}" data-c="${c.key}">
      <div class="ic">${c.ic}</div><div class="nm">${c.name}</div><div class="ds">${c.ds}</div>
      <div class="pr">${pr}</div></button>`;
  }
  html+='</div>';
  const card=document.getElementById("card");card.innerHTML=html;
  card.querySelectorAll(".catcard").forEach(b=>{b.onclick=()=>{
    if(b.dataset.c==="sprint"){if(!ALL.length){alert("單字資料還沒載入完成,請稍候再試。");return;}curCat="sprint";phase="sprintSetup";render();return;}
    if(b.dataset.c==="gsprint"){if(!GRAMMAR.length){alert("文法資料還沒載入完成,請稍候再試。");return;}curCat="gsprint";phase="gsprintSetup";render();return;}
    if(levelCount(b.dataset.c)===0){alert("這個大類的資料還沒上傳,敬請期待。");return;}
    curCat=b.dataset.c;phase="cat";render();};});

function renderCat(){
  const n=levelCount(curCat),cur=currentLevel(curCat);
  let html="";
  if(curCat==="vocab"){
    html+='<div class="setting"><div class="lab">每天練幾個字(可隨時調整)</div><div class="chips" id="chips">'+
      DAY_OPTIONS.map(x=>`<button class="chip ${x===state.wordsPerDay?'on':''}" data-n="${x}">${x} 個</button>`).join("")+'</div></div>';
  }
  const allDone=cur>=n;
  html+=`<button class="resume" id="resume">${allDone?'全部完成,複習第 1 關':('繼續挑戰 · 第 '+(cur+1)+' 關')}</button>`;
  html+=`<div class="hint">下一關預告:${fmtHint(curCat,allDone?0:cur)}</div>`;
  html+='<div class="menu-title">所有關卡(可自由前後挑戰)</div><div class="grid" id="grid">';
  for(let i=0;i<n;i++){const rec=state.progress[curCat]["L"+i];
    let tag=(curCat==="vocab")?('<div class="st" style="color:var(--accent)">'+vocabFmtLabel(i)+'</div>'):'';
    if(curCat==="reading"){const it=readingLevels()[i];
      const rt=it&&it.type==="passagecloze"?{l:"克漏字",c:"cloze"}:(it&&it.genre==="課外讀物"?{l:"課外讀物",c:"fun"}:{l:"閱讀",c:"read"});
      tag='<div class="st"><span class="rtag '+rt.c+'">'+rt.l+'</span></div>';}
    const adv=(curCat==="vocab"&&vocabAdv(i))?'<span class="advbadge">進階</span>':'';
    html+=`<button class="daycell ${rec?'done':''}" data-l="${i}">${adv}
      <div class="dn">第 ${i+1} 關</div>${tag}<div class="st">${rec?('✓ '+rec.score+'/'+rec.total):'未挑戰'}</div></button>`;}
  html+='</div>';
  const card=document.getElementById("card");card.innerHTML=html;
  if(curCat==="vocab")card.querySelectorAll("#chips .chip").forEach(c=>{c.onclick=()=>{state.wordsPerDay=parseInt(c.dataset.n);saveState();rechunk();render();};});
  document.getElementById("resume").onclick=()=>{viewLevel=allDone?0:cur;enterLevel();};
  card.querySelectorAll("#grid .daycell").forEach(c=>{c.onclick=()=>{viewLevel=parseInt(c.dataset.l);enterLevel();};});
}

function enterLevel(){
  if(curCat==="vocab"){phase="learn";learnIdx=0;render();}
  else if(curCat==="grammar"){phase="learn";learnIdx=0;render();}
  else if(curCat==="reading"){const item=readingLevels()[viewLevel];if(item&&item.type==="reading"){phase="learn";learnIdx=0;render();}else{buildQuiz();}}
  else if(curCat==="exam"){buildQuiz();}
}

function pickDistract(word,n,mode){
  const others=ALL.filter(x=>x.en!==word.en);
  const conf=new Set(confusables(word.en).map(x=>x.en));
  if(mode==="hard"){ // 優先用形近字當干擾(已先教過辨別)
    const near=shuffle(others.filter(x=>conf.has(x.en)));
    const rest=shuffle(others.filter(x=>!conf.has(x.en)))
      .sort((a,b)=>((b.en[0]===word.en[0])-(a.en[0]===word.en[0])));
    return [...near,...rest].slice(0,n);
  }
  // easy / 預設:刻意排除形近字,挑長相明顯不同的字 → 先讓考生答對、建立信心
  const pool=shuffle(others.filter(x=>!conf.has(x.en)));
  return (pool.length>=n?pool:shuffle(others)).slice(0,n);
}
function maskWord(en,full){
  const ch=en.split("");
  if(full)return ch.map(c=>/[a-z]/i.test(c)?"_":c).join(" ");
  let idx=ch.map((c,i)=>/[a-z]/i.test(c)?i:-1).filter(i=>i>0&&i<ch.length-1);
  idx=shuffle(idx).slice(0,Math.max(1,Math.round(idx.length*0.5)));
  return ch.map((c,i)=>idx.includes(i)?"_":c).join(" ");
}
function hlWord(sentence,word){
  try{return sentence.replace(new RegExp("\\b"+word+"\\b","i"),m=>'<b style="color:var(--accent)">'+m+'</b>');}catch(e){return sentence;}
}
// 把例句裡的訊號詞標紅(支援片語與含標點如 Look!),呼應下方 💡 說明
// forms 有給時,連「實際出現在句中的動詞樣子」一起標(紅+底線),呼應下方動詞表
function hlSignal(sentence,sig,forms){
  let out=sentence;
  if(sig){
    try{const esc=sig.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
      out=out.replace(new RegExp(esc),m=>'<b style="color:var(--accent)">'+m+'</b>');}catch(e){}
  }
  if(forms){
    // 長的優先(opening 先於 open),取句中真的有的那個樣子,只標第一個
    const cands=[forms.ing,forms.past,forms.s,forms.base].filter(Boolean)
      .sort((a,b)=>b.length-a.length);
    const plain=out.replace(/<[^>]+>/g,"");
    for(const v of cands){
      try{const esc=v.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
        const re=new RegExp("\\b"+esc+"\\b");
        if(re.test(plain)){
          out=out.replace(re,m=>'<b style="color:var(--accent);text-decoration:underline">'+m+'</b>');
          break;}
      }catch(e){}
    }
  }
  return out;
}

// ===== 例句填空(cloze):比照考古題,看英文句子選同詞性的字填空 =====
// 產生「實際可能出現在句中的字形」:原形 + s/es/ed/d/ing/y→ies/雙寫尾子音
function wordForms(en){
  en=(en||"").toLowerCase();
  const s=new Set([en,en+"s",en+"es",en+"ed",en+"d",en+"ing"]);
  if(en.endsWith("e")){s.add(en.slice(0,-1)+"ing");s.add(en.slice(0,-1)+"ed");}
  if(en.endsWith("y")){s.add(en.slice(0,-1)+"ies");s.add(en.slice(0,-1)+"ied");}
  if(en.length>=3&&!"aeiou".includes(en[en.length-1])&&"aeiou".includes(en[en.length-2])&&!"aeiou".includes(en[en.length-3])){
    s.add(en+en[en.length-1]+"ing");s.add(en+en[en.length-1]+"ed");}
  return [...s].sort((a,b)=>b.length-a.length); // 長的先試,優先挖到變化形而非子字串
}
const CLOZE_GAP='<span style="border-bottom:2.5px solid var(--accent);padding:0 26px;margin:0 3px"></span>';
// 把例句裡的目標字(含變化形)換成空格;找不到回 null → 呼叫端 fallback 拼字
function clozeBlank(ex,en){
  for(const f of wordForms(en)){
    try{const re=new RegExp("\\b"+f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
      if(re.test(ex))return ex.replace(re,CLOZE_GAP);}catch(e){}
  }
  return null;
}
// 答完把正解(實際出現的字形)在整句裡標紅
function hlClozeAnswer(ex,en){
  for(const f of wordForms(en)){
    try{const re=new RegExp("\\b"+f.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
      if(re.test(ex))return ex.replace(re,m=>'<b style="color:var(--accent)">'+m+'</b>');}catch(e){}
  }
  return ex;
}
// 取主要詞性(取「/」前那個,去掉句點):n./v./adj./adv./conj./prep./片語
function primaryPos(pos){pos=(pos||"").trim();if(pos.includes("片語"))return "片語";
  return (pos.split("/")[0].trim().replace(/\.$/,""))||"n";}
// 同詞性干擾(考題式):四個選項同詞性、逼考生靠語境分辨字義,不能再靠「猜詞性」
function pickDistractPos(word,n){
  const tgt=primaryPos(word.pos);
  const syn=new Set((word.syn||[]).map(s=>s.en)); // 排除同義字,避免兩個答案都對
  let pool=shuffle(ALL.filter(x=>x.en!==word.en&&x.zh!==word.zh&&!syn.has(x.en)&&primaryPos(x.pos)===tgt));
  if(pool.length<n){ // 詞性池不足(如副詞少)→ 補其他詞性
    const seen=new Set(pool.map(x=>x.en));
    pool=pool.concat(shuffle(ALL.filter(x=>x.en!==word.en&&x.zh!==word.zh&&!syn.has(x.en)&&!seen.has(x.en))));
  }
  return pool.slice(0,n);
}
// 語境夠才出 cloze:例句要挖得出空格、且字數>=5(太短的句子語境不足)→ 否則回 null
function buildClozeQ(w){
  const blanked=clozeBlank(w.ex,w.en);
  if(!blanked||w.ex.split(/\s+/).length<5)return null;
  const dis=pickDistractPos(w,3); // 干擾字(同詞性);保留物件以便附中文對照
  const opts=shuffle([w.en,...dis.map(x=>x.en)]);
  const optZh=[{en:w.en,zh:w.zh},...dis.map(x=>({en:x.en,zh:x.zh}))]; // 四選一每個選項的中文(答完才顯示)
  return {kind:"choice",cloze:true,head:blanked,headSmall:true,
    ask:"選出最適合填入空格的字",options:opts,answer:w.en,optZh,
    clozeZh:w.ext,clozeEx:w.ex,clozeEn:w.en}; // 注意:不設 speak,避免自動唸出答案
}
// 語境不足時的後備:拼全字(沿用既有 fill 題型)
function fillFullQ(w,headPrefix){
  return {kind:"fill",head:(headPrefix||"")+w.zh,headSmall:true,
    ask:"聽發音,把整個單字拼出來",speak:w.en,syl:w.syl,answer:w.en,full:true};
}
// 答完顯示:整句英文(正解標紅)+ 整句中文 + 🔊;四選一各選項中文對照;cloze 答對/答錯都出現
function clozeReviewHTML(q){
  let optList="";
  if(q.optZh&&q.optZh.length){ // 把四個選項都列出中文,正解標色,讓考生順便認得其他三個字
    const m={};q.optZh.forEach(o=>m[o.en.toLowerCase()]=o.zh);
    optList='<div class="optzh">'+q.options.map(o=>{const isAns=(o===q.answer);
      return '<div class="optzh-row'+(isAns?' ans':'')+'"><span class="optzh-en">'+o+'</span>'+
        '<span class="optzh-zh">'+(m[o.toLowerCase()]||"")+'</span>'+
        '<span class="confspk" data-en="'+o+'">🔊</span></div>';}).join("")+'</div>';
  }
  return '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--muted)">'+
    '<div>'+hlClozeAnswer(q.clozeEx,q.clozeEn)+
    ' <button class="confspk" data-en="'+q.clozeEn+'" style="background:none;border:none;cursor:pointer;font-size:15px">🔊</button></div>'+
    '<div style="color:var(--muted);margin-top:4px">'+q.clozeZh+'</div>'+optList+'</div>';
}

// ===== 單字衝刺(第 5 大類):全字混抽、間隔複習加權 =====
// 每個字記 {r:答對次數, w:答錯次數},存在 state.progress.sprint[en]
function sprintWeight(en){
  const sp=state.progress.sprint||{};const s=sp[en]||{r:0,w:0};
  const w_stat=s.w||0, r_stat=s.r||0;
  let weight=1;
  weight*=(1+2*w_stat);                       // 錯越多 → 權重越高
  if(w_stat===0&&r_stat>=2)weight*=0.25;      // 連續答對且沒錯 → 很少出(但不歸零)
  else if(r_stat>w_stat)weight*=0.6;          // 對多於錯 → 降低
  if(r_stat===0&&w_stat===0)weight*=1.5;      // 沒練過 → 略優先,讓新字浮現
  return weight;
}
// 加權隨機抽樣,一個 session 內不重複
// weightFn(item)->權重;預設沿用單字衝刺(讀 .en),確保既有呼叫行為完全不變
function weightedSampleNoRepeat(pool,n,weightFn){
  weightFn=weightFn||(x=>sprintWeight(x.en));
  const picks=[],avail=pool.slice();
  n=Math.min(n,avail.length);
  for(let k=0;k<n;k++){
    let tot=0;const ws=new Array(avail.length);
    for(let i=0;i<avail.length;i++){const x=weightFn(avail[i]);ws[i]=x;tot+=x;}
    let r=Math.random()*tot,idx=avail.length-1;
    for(let i=0;i<avail.length;i++){r-=ws[i];if(r<=0){idx=i;break;}}
    picks.push(avail[idx]);avail.splice(idx,1);
  }
  return picks;
}

function startSprint(){
  if(!ALL.length){alert("單字資料還沒載入完成,請稍候再試。");return;}
  curCat="sprint";sprintWrong=[];quizCtx=null;quizCtxZh=null;quizCtxGloss=null;quizGenre=null;quizStory=false;quizStoryData=null;quizCloze=false;quizIdx=0;quizScore=0;answered=false;
  const picks=weightedSampleNoRepeat(ALL,state.sprintN||DEFAULT_SPRINT_N,w=>sprintWeight(w.en));
  quizQ=picks.map(w=>{
    const lvtag=w.level===3?'<span class="lvtag lv3">進階</span> ':w.level===2?'<span class="lvtag lv2">進階</span> ':'';

// ===== 文法衝刺(第 6 大類):全句型混抽、間隔複習加權 =====
// 每個句型記 {r:答對次數, w:答錯次數},存在 state.progress.gsprint[pattern]
// 公式與 sprintWeight 完全相同,只是改讀 gsprint 與用 pattern 當 key
function gramSprintWeight(pattern){
  const sp=state.progress.gsprint||{};const s=sp[pattern]||{r:0,w:0};
  const w_stat=s.w||0, r_stat=s.r||0;
  let weight=1;
  weight*=(1+2*w_stat);                       // 錯越多 → 權重越高
  if(w_stat===0&&r_stat>=2)weight*=0.25;      // 連續答對且沒錯 → 很少出(但不歸零)
  else if(r_stat>w_stat)weight*=0.6;          // 對多於錯 → 降低
  if(r_stat===0&&w_stat===0)weight*=1.5;      // 沒練過 → 略優先,讓新句型浮現
  return weight;
}
function renderGramSprintSetup(){

function startGramSprint(){
  if(!GRAMMAR.length){alert("文法資料還沒載入完成,請稍候再試。");return;}
  curCat="gsprint";gramSprintWrong=[];quizCtx=null;quizCtxZh=null;quizCtxGloss=null;quizGenre=null;quizStory=false;quizStoryData=null;quizCloze=false;quizIdx=0;quizScore=0;answered=false;
  // 全句型混抽,加權不重複;實際題數 = min(設定值, 可用句型數)
  const picks=weightedSampleNoRepeat(GRAMMAR,state.gsprintN||DEFAULT_GSPRINT_N,g=>gramSprintWeight(g.pattern));
  quizQ=[];
  for(const it of picks){
    const qq=shuffle(gramBank(it))[0]; // 每句型抽一題;純考題,不放找關鍵字教學步驟
    if(!qq)continue;
    const q=gramFormQ(qq);
    q.gPattern=it.pattern;            // 記回 stats 用
    q.gZh=it.zh;                      // 完成畫面一句說明備援
    quizQ.push(q);
  }
  phase="quiz";render();
}
function finishGramSprint(){phase="gsprintDone";render();}
function renderGramSprintDone(){
  const total=quizQ.length;
  const seen=new Set(),wrongs=[];
  for(const q of gramSprintWrong){if(seen.has(q.gPattern))continue;seen.add(q.gPattern);wrongs.push(q);}
  let html=`<div class="counter" style="text-align:center">文法衝刺完成</div>
    <div style="text-align:center;padding:14px 0">
    <div style="font-size:52px">🧩</div>
    <div style="font-family:'Fraunces';font-size:40px;color:var(--accent);font-weight:600">${quizScore} / ${total}</div>
    <p style="color:var(--muted);margin-top:6px">${wrongs.length?'答錯的句型會在之後更常出現,多衝幾輪就熟了。':'全對!保持手感,等等再來一回。'}</p></div>`;
  if(wrongs.length){
    html+='<div class="conf"><div class="conf-h">這次答錯的句型</div>'
      +wrongs.map(q=>'<div class="conf-row"><span class="conf-w" style="font-size:15px;min-width:0">'+q.gPattern+'</span><span class="conf-zh">'+(q.note||q.gZh||"")+'</span></div>').join("")
      +'</div>';

  html+=`<div class="row"><button class="btn btn-ghost" id="home">回目錄</button>
    <button class="btn btn-main" id="again">再衝一回 🧩</button></div>`;
  const card=document.getElementById("card");card.innerHTML=html;
  document.getElementById("home").onclick=()=>{phase="home";render();};
  document.getElementById("again").onclick=()=>startGramSprint();
}

function buildQuiz(){
  quizQ=[];quizCtx=null;quizCtxZh=null;quizCtxGloss=null;quizGenre=null;quizStory=false;quizStoryData=null;quizCloze=false;quizIdx=0;quizScore=0;answered=false;
  if(curCat==="vocab"){
    const set=DAYS[viewLevel];
    if(vocabAdv(viewLevel)){ // 進階關:考題式例句填空(前 2 題拼字緩衝 → 全部字 cloze)
      const words=shuffle(set);
      const bufN=Math.min(2,words.length);
      words.slice(0,bufN).forEach(w=>quizQ.push(fillFullQ(w))); // 緩衝:先喚醒「字長怎樣」
      words.forEach(w=>quizQ.push(buildClozeQ(w)||fillFullQ(w))); // 主體:語境夠出 cloze,太薄回拼字
    } else { // 暖身關(0–5)與基礎綜合關:維持原本由淺入深的認字題,既有行為完全不動
      const mixed=vocabMixed(viewLevel);
      shuffle(set).forEach((w,j)=>{
        const f=mixed?vocabQFmt(viewLevel,j):vocabFmt(viewLevel);
        const hard=(viewLevel>=3||(w.level||1)>=2); // 進階字或後段關卡:用形近字干擾
        if(f==="zh"){const opts=shuffle([w.zh,...pickDistract(w,3,"easy").map(x=>x.zh)]);
          quizQ.push({kind:"choice",head:w.en,speak:w.en,ask:"這個字的意思是?(可點🔊)",options:opts,answer:w.zh});}
        else if(f==="en"){const opts=shuffle([w.en,...pickDistract(w,3,hard?"hard":"easy").map(x=>x.en)]);
          quizQ.push({kind:"choice",head:w.zh,headSmall:true,ask:"哪一個是正確的英文?",options:opts,answer:w.en});}
        else{quizQ.push({kind:"fill",head:w.zh,headSmall:true,ask:(f==="fillf"?"聽發音,把整個單字拼出來":"聽發音,補上缺少的字母"),speak:w.en,syl:w.syl,answer:w.en,full:(f==="fillf")});}
      });
    }
  } else if(curCat==="grammar"){
    const lvl=gramLevels()[viewLevel];
    const per=lvl.length<=4?2:1; // 小家族每句型抽2題,大家族抽1題,控制每關長度
    for(const it of shuffle(lvl.slice())){
      const draw=shuffle(gramBank(it)).slice(0,per);
      const sq=buildSignalQ(it);if(sq)quizQ.push(sq); // 有標 signal 才出現「找關鍵字」步驟(每句型一次)
      for(const qq of draw)quizQ.push(gramFormQ(qq)); // 從題庫抽1~2題
    }
    for(const it of lvl){ // 有 confuse 才出現辨析題,放在最後當進階
      if(it.confuse&&Array.isArray(it.confuse.options))
        quizQ.push({kind:"choice",head:it.confuse.q,headSmall:true,ask:"辨析:哪一個用法才對?",options:shuffle(it.confuse.options.slice()),answer:it.confuse.answer,note:it.confuse.note});
    }
  } else if(curCat==="reading"){
    const item=readingLevels()[viewLevel];
    quizCtxZh=item.passageZh||null;
    quizCtxGloss=item.glossary||item.keywords||null;
    quizGenre=item.genre||null;
    quizStory=(quizGenre==="課外讀物");
    quizCloze=(item.type==="passagecloze");
    quizStoryData=(item.story&&item.story.length)?item.story:null;
    quizFill={};
    if(item.type==="reading"){
      quizCtx=item.passage;
      for(const q of item.questions){
        const ask=quizStory?"讀完想一想:":(q.qtype?("【"+q.qtype+"】根據短文選出答案"):"根據短文選出答案");
        quizQ.push({kind:"choice",head:q.q,headSmall:true,ask,
          options:shuffle(q.options.slice()),answer:q.answer,
          note:q.note||null,locate:q.locate||null});
      }
    } else if(item.type==="passagecloze"){
      quizCtx=item.passage;
      for(const b of item.blanks){
        const head=(b.n!=null?("第 "+b.n+" 格"):"克漏字");
        const ask=b.point?("【"+b.point+"】選最適合填入的字"):"選最適合填入空格的字";
        const note=b.note?((b.point?("〔"+b.point+"〕"):"")+b.note):(b.point||null);
        quizQ.push({kind:"choice",head,headSmall:true,ask,
          options:shuffle(b.options.slice()),answer:b.answer,note,blankN:b.n});
      }
    }
  } else if(curCat==="exam"){
    if(EXAM&&EXAM.rounds[viewLevel]){ // ===== 整卷模式:讀 exam.json,依四區塊順序組卷(區塊間不洗牌)=====
      const R=EXAM.rounds[viewLevel];quizFill={};
      // 1) 字彙:每題一句挖一格,依語境選字(區塊內題序可洗、選項可洗)
      for(const v of shuffle((R.vocab||[]).slice())){
        quizQ.push({kind:"choice",head:v.stem,headSmall:true,ask:"依句意選出最適合的字",
          options:shuffle(v.options.slice()),answer:v.answer,note:v.note||null});}
      // 2) 文法:單句四選一
      for(const g of shuffle((R.grammar||[]).slice())){
        quizQ.push({kind:"choice",head:g.q,headSmall:true,ask:"選出正確的文法",
          options:shuffle(g.options.slice()),answer:g.answer,note:g.note||null});}
      // 3) 克漏字題組:每格一題;短文跟著每題走(ctxMode:cloze),格號維持 1..n 不洗
      if(R.cloze&&Array.isArray(R.cloze.blanks)){const cz=R.cloze;
        for(const b of cz.blanks){
          const head=(b.n!=null?("第 "+b.n+" 格"):"克漏字");
          const ask=b.point?("【"+b.point+"】選最適合填入的字"):"選最適合填入空格的字";
          const note=b.note?((b.point?("〔"+b.point+"〕"):"")+b.note):(b.point||null);
          quizQ.push({kind:"choice",head,headSmall:true,ask,options:shuffle(b.options.slice()),
            answer:b.answer,note,blankN:b.n,
            ctxPassage:cz.passage,ctxZh:cz.passageZh||null,ctxGloss:cz.glossary||null,ctxMode:"cloze"});}}
      // 4) 閱讀題組:每題短文跟著走(ctxMode:reading),保留定位句 highlight
      if(R.reading&&Array.isArray(R.reading.questions)){const rd=R.reading;
        for(const q of rd.questions){
          const ask=q.qtype?("【"+q.qtype+"】根據短文選出答案"):"根據短文選出答案";
          quizQ.push({kind:"choice",head:q.q,headSmall:true,ask,options:shuffle(q.options.slice()),
            answer:q.answer,note:q.note||null,locate:q.locate||null,
            ctxPassage:rd.passage,ctxZh:rd.passageZh||null,ctxGloss:rd.glossary||null,ctxMode:"reading"});}}
      // 整卷不再整體洗牌(維持字彙→文法→克漏字→閱讀的考卷順序)
    } else { // ===== 後備:沒有 exam.json 時的即時組卷(保留原行為)=====
      const vs=shuffle(ALL).slice(0,4);for(const w of vs){const opts=shuffle([w.en,...pickDistract(w,3,"hard").map(x=>x.en)]);quizQ.push({kind:"choice",head:w.zh,headSmall:true,ask:"選出正確的英文",options:opts,answer:w.en});}
      for(const it of shuffle(GRAMMAR).slice(0,3)){const qq=shuffle(gramBank(it))[0];if(qq)quizQ.push(gramFormQ(qq));}
      const cl=READING.filter(r=>r.type==="cloze");if(cl.length){const c=shuffle(cl)[0];quizQ.push({kind:"choice",head:c.text,headSmall:true,ask:"選出最適合填入的字",options:shuffle(c.options.slice()),answer:c.answer,note:c.note});}
      quizQ=shuffle(quizQ);
    }
  }
  phase="quiz";render();
}

// ===== 閱讀短文呈現:逐句分段、原文 highlight、克漏字空格、課外讀物對話氣泡 =====
function escHTML(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
// 長文逐句分段(每 2 句一段),保護常見縮寫的句點不被當句尾
function paraSplit(p){
  const PROT="\u0001";
  let t=p.replace(/\b(Mr|Mrs|Ms|Dr|St|Jr|Sr|Prof|vs|etc|Inc|Ltd|No|U\.S|a\.m|p\.m)\./g,"$1"+PROT);
  t=t.replace(/([.!?]["”’]?)\s+(?=[A-Z“"])/g,"$1\u0002");
  const parts=t.split("\u0002"),groups=[];
  for(let i=0;i<parts.length;i+=2)groups.push(parts.slice(i,i+2).join(" "));
  return groups.map(g=>"<p>"+escHTML(g).replace(/\u0001/g,".")+"</p>").join("");
}
// 把定位句(原文逐字)在已轉義的 HTML 裡標起來
function hlInHTML(html,locate){if(!locate)return html;const e=escHTML(locate),i=html.indexOf(e);return i<0?html:html.slice(0,i)+"<mark>"+e+"</mark>"+html.slice(i+e.length);}
// 連貫克漏字:把 ___(n) 換成空格 token;fillMap 有答案就填入(綠色)
function clozePassageHTML(p,curN,fillMap){
  const re=/___\((\d+)\)/g;let out="",last=0,m;
  while((m=re.exec(p))){out+=escHTML(p.slice(last,m.index));const k=parseInt(m[1]);
    if(fillMap&&fillMap[k]!=null)out+='<span class="blk filled">'+escHTML(fillMap[k])+'</span>';
    else out+='<span class="blk'+(k===curN?' cur':'')+'">'+k+'</span>';
    last=m.index+m[0].length;}
  out+=escHTML(p.slice(last));return out;
}
// 課外讀物:對話(引號)→ 氣泡(依說話者分左右),第三人稱旁白 → 中間情境敘述。全文照舊,只調呈現。
function storyHTML(p){
  const segs=[],re=/[“"][^“”"]*[”"]/g;let last=0,m;
  while((m=re.exec(p))){if(m.index>last)segs.push({t:"n",x:p.slice(last,m.index)});segs.push({t:"q",x:m[0]});last=m.index+m[0].length;}
  if(last<p.length)segs.push({t:"n",x:p.slice(last)});
  const NM=/\b(Tony|Steve|Cap|Bruce|Nat|Peter|Pepper)\b/;
  const fix=n=>n==="Cap"?"Steve":n;
  let prev=null;
  for(let i=0;i<segs.length;i++){if(segs[i].t!=="q")continue;
    const before=(segs[i-1]&&segs[i-1].t==="n")?segs[i-1].x:"";
    const after=(segs[i+1]&&segs[i+1].t==="n")?segs[i+1].x:"";
    let who=null;
    let tag=after.match(/^[\s,]*([A-Z][a-z]+)\s+(said|asked|whispered|replied|murmured|added|smiled|sighed)/)
          ||before.match(/([A-Z][a-z]+)\s+(said|asked|whispered|replied|murmured|added|smiled|sighed)[^.]*$/);
    if(tag&&NM.test(tag[1]))who=fix(tag[1]);
    if(!who){const b=before.match(NM);const a=after.match(NM);who=b?fix(b[1]):(a?fix(a[1]):null);}
    if(!who)who=prev==="Tony"?"Steve":"Tony";
    segs[i].who=who;prev=who;
  }
  let left=null,html="";
  for(const s of segs){
    if(s.t==="n"){const tx=s.x.trim();if(tx)html+='<div class="narr">'+escHTML(tx)+'</div>';}
    else{if(!left)left=s.who;const side=s.who===left?"L":"R";
      html+='<div class="bub '+side+'"><span class="who">'+escHTML(s.who)+'</span>'+escHTML(s.x)+'</div>';}
  }
  return html+'<div class="endmark">❦</div>';
}
// 課外讀物(B 方案):散文式段落,對話用左側色條＋說話者小標(非左右氣泡);每句可點開中文(句對句)
function storyProseHTML(blocks){
  let html="",k=0;
  for(const b of blocks){
    const dlg=(b.k==="d");
    const who=(b.who||"").toLowerCase();
    const cls="para "+(dlg?("d "+who):"n");
    html+=`<div class="${cls}">`;
    if(dlg&&b.who)html+=`<span class="who">${escHTML(b.who)}</span>`;
    for(const sObj of b.s){
      html+=`<span class="sent" data-k="${k}">${escHTML(sObj.en)}</span><span class="sentzh" data-k="${k}">${escHTML(sObj.zh)}</span> `;
      k++;
    }
    html+=`</div>`;
  }
  return html;
}
// 統一產生短文區內容(可帶 highlight 定位句)
// ctx(選填)= 該題自帶的短文設定 {passage,mode("story"|"cloze"|"reading"),story};沒帶就退回全域 quizCtx/quizStory/quizCloze
function ctxInnerHTML(q,locate,ctx){
  ctx=ctx||{passage:quizCtx,mode:(quizStory?"story":(quizCloze?"cloze":"reading")),story:quizStoryData};
  const passage=ctx.passage,mode=ctx.mode;
  if(mode==="story"){
    if(ctx.story)return storyProseHTML(ctx.story); // 有句對句資料 → 散文點讀模式
    let h=storyHTML(passage);return locate?hlInHTML(h,locate):h; // 退回舊氣泡版
  }
  if(mode==="cloze")return clozePassageHTML(passage,(q&&q.blankN)||0,quizFill);
  const lng=passage.split(/\s+/).length>120;
  let h=lng?paraSplit(passage):escHTML(passage);
  return locate?hlInHTML(h,locate):h;
}
function renderQuiz(){

    if(tools)html+=`<div class="ctxtools">${tools}</div>`;

        return `<div class="gl"><div class="gl-l"><b>${g.en}</b>${pos}<span class="glspk" data-en="${g.en}">🔊</span></div><span class="gl-zh">${g.zh}</span></div>`;}).join("")+`</div>`;
    if(ctxZh)html+=`<div class="ctxzh" id="ctxzh">${ctxZh}</div>`;
    html+=`</div>`;
  }
  html+=`<div class="qhead ${q.headSmall?'small':''}">${q.head}</div>`;

    <div id="zhhint" class="hint" style="display:none;margin-top:8px"></div></div>`;
  if(q.kind==="choice"){html+='<div id="opts"></div>';}

    <div class="fillrow"><span class="fillmask">${maskWord(q.answer,q.full)}</span></div>
    <input class="fillin" id="fin" placeholder="${q.full?'聽發音,把整個字拼出來':'把缺少的字母補上'}" autocomplete="off" autocapitalize="off">
    <div class="row"><button class="btn btn-main" id="sub">送出</button></div>`;}
  html+=`<div class="feedback" id="fb"></div>`;

  {const gb=document.getElementById("glossbtn");if(gb)gb.onclick=()=>{const h=document.getElementById("glossbox");const open=h.classList.toggle("show");gb.textContent=open?"收起難字":("看難字 ("+ctxGloss.length+")");};}

    // 答完更新短文區:閱讀 → 在原文 highlight 定位句;克漏字 → 該格填上正解;課外讀物散文 → 不重繪(保留點讀狀態)
    // 模擬考(exam)整卷的克漏字/閱讀題組也走這條(用該題自帶的 curCtx),才會填格與標定位句
    if((curCat==="reading"||curCat==="exam")&&ctxPassage&&!(isStory&&storyData)){const cp=document.getElementById("ctxpassage");
      if(cp){if(isCloze&&q.blankN!=null){quizFill[q.blankN]=q.answer;cp.innerHTML=clozePassageHTML(ctxPassage,q.blankN,quizFill);}
        else if(q.locate){cp.innerHTML=ctxInnerHTML(q,q.locate,curCtx);}}}
    let body=(ok?"✓ 答對了!":"✗ 正確答案:<b>"+q.answer+"</b>")+(q.note?"<br>"+q.note:"");
    if(q.locate){const hled=!!document.querySelector("#ctxpassage mark");
      body+='<div class="hint" style="margin-top:8px;text-align:left">'+(hled?"📍 答案就在上面標黃的那一句":("📍 答案線索:「"+q.locate+"」"))+'</div>';}
    if(q.cloze)body+=clozeReviewHTML(q); // 例句填空:答完一律給整句英文(正解標紅)+整句中文+🔊
    else if(!ok && (curCat==="vocab"||curCat==="exam"||curCat==="sprint"))body+=discrimHTML(q.answer,picked); // 形近字辨別卡:單字/模擬考/衝刺都出現
    if(q.qZh && (curCat==="grammar"||curCat==="gsprint"))body+=gramSentenceHTML(q); // 文法/文法衝刺:答完分開列出整句中文
    fb.innerHTML=body;
    fb.querySelectorAll(".confspk").forEach(b=>{b.onclick=(e)=>{e.stopPropagation();speak(b.dataset.en);};});
    const manualNext=(curCat==="grammar"||curCat==="gsprint"||q.cloze||(curCat==="reading"&&(q.note||q.locate))||(curCat==="exam"&&(q.note||q.locate))); // 文法說明長、例句填空看整句翻譯、閱讀/模擬考有解析或定位 → 答對也讓考生自己按
    if(ok && !manualNext){setTimeout(go,q.note?1300:850);} // 其餘大類答對仍保留節奏自動前進
    else{ // 答錯一律停住;文法/文法衝刺答對也停住,給時間看說明
      const wrap=document.createElement("div");wrap.className="row";
      wrap.innerHTML='<button class="btn btn-main" id="nextq">'+(ok?'下一題 ›':'我看懂了,下一題 ›')+'</button>';
      card.appendChild(wrap);
      document.getElementById("nextq").onclick=go;
    }}
  if(q.kind==="choice"){
    const box=document.getElementById("opts");
    q.options.forEach(o=>{const b=document.createElement("button");b.className="opt";b.textContent=o;
      b.onclick=()=>{if(answered)return;document.querySelectorAll(".opt").forEach(x=>x.disabled=true);
        if(o===q.answer)b.classList.add("correct");else{b.classList.add("wrong");document.querySelectorAll(".opt").forEach(x=>{if(x.textContent===q.answer)x.classList.add("correct");});}
        after(o===q.answer,o);};box.appendChild(b);});
  } else if(q.kind==="signal"){
    const box=document.getElementById("chips"),chipEls=[];
    q.chips.forEach((t,i)=>{const b=document.createElement("button");b.className="chip";b.textContent=t;chipEls.push(b);
      b.onclick=()=>{if(answered)return;chipEls.forEach(x=>x.disabled=true);
        if(i===q.answerIdx)b.classList.add("correct");else{b.classList.add("wrong");chipEls[q.answerIdx].classList.add("correct");}
        after(i===q.answerIdx,t);};box.appendChild(b);});
  } else if(q.kind==="fill"){
    const inp=document.getElementById("fin");
    document.getElementById("sub").onclick=()=>{if(answered)return;const v=inp.value.trim();after(v.toLowerCase()===q.answer.toLowerCase(),v);};
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("sub").click();});
    inp.focus();
  }
}

function finishLevel(){
  phase="done";const total=quizQ.length,prev=state.progress[curCat]["L"+viewLevel];
  if(!prev||quizScore>prev.score){state.progress[curCat]["L"+viewLevel]={score:quizScore,total:total};saveState();}
  render();
}

function renderDone(){
  const total=quizQ.length,rec=state.progress[curCat]["L"+viewLevel]||{score:quizScore,total:total};
  const pass=rec.score>=Math.ceil(total*0.6),n=levelCount(curCat),hasNext=viewLevel<n-1;
  let html=`<div class="counter" style="text-align:center">第 ${viewLevel+1} 關完成</div>
    <div style="text-align:center;padding:14px 0">
    <div style="font-size:52px">${pass?"🎉":"💪"}</div>
    <div style="font-family:'Fraunces';font-size:40px;color:var(--accent);font-weight:600">${rec.score} / ${total}</div>
    <p style="color:var(--muted);margin-top:6px">${pass?"做得好!":"再練一次會更熟。"}</p></div>`;
  html+=`<div class="hint">${hasNext?("下一關預告:"+fmtHint(curCat,viewLevel+1)):"這個大類完成了,回目錄挑戰別的吧!"}</div>`;
  html+=`<div class="row"><button class="btn btn-ghost" id="again">再練一次</button>`;
  html+=hasNext?`<button class="btn btn-main" id="next">下一關 ›</button>`:`<button class="btn btn-main" id="home">回目錄</button>`;
  html+=`</div><div class="row" style="padding-top:10px"><button class="btn btn-ghost" id="cat">回 ${CATS.find(c=>c.key===curCat).name} 關卡列表</button></div>`;
  document.getElementById("card").innerHTML=html;
  document.getElementById("again").onclick=()=>{viewLevel=viewLevel;enterLevel();};
  const nx=document.getElementById("next");if(nx)nx.onclick=()=>{viewLevel++;enterLevel();};
  const hm=document.getElementById("home");if(hm)hm.onclick=()=>{phase="home";render();};
  document.getElementById("cat").onclick=()=>{phase="cat";render();};
}

document.getElementById("menuBtn").onclick=()=>{phase="home";render();};
init();
</script>
</body>
</html>
