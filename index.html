<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日郵政英文</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#f6efe3;--paper2:#efe5d4;--ink:#2b2622;--muted:#7d7264;
    --accent:#d2462f;--accent-soft:#f3c9bf;--teal:#2f6f6a;--line:#e0d4bf;--good:#2f7d54;--bad:#c0432e;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;
    background-image:radial-gradient(var(--line) 0.5px,transparent 0.5px);background-size:18px 18px;padding:24px 16px 60px;}
  .wrap{max-width:520px;margin:0 auto;}
  header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;}
  .brand{font-family:'Fraunces',serif;font-size:26px;font-weight:600;letter-spacing:-0.01em;}
  .brand span{color:var(--accent);}
  .streak{background:var(--accent);color:#fff;border-radius:20px;padding:4px 12px;font-size:13px;font-weight:500;}
  .tally{font-size:12px;color:var(--muted);margin-bottom:16px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;background:var(--paper2);
    border:1px solid var(--line);border-radius:14px;padding:8px 10px;margin-bottom:18px;}
  .menuBtn{background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-size:14px;font-family:inherit;cursor:pointer;color:var(--ink);}
  .menuBtn:hover{background:var(--accent-soft);}
  .daylabel{text-align:center;} .daylabel .big{font-family:'Fraunces',serif;font-size:18px;font-weight:600;}
  .daylabel .sub{font-size:12px;color:var(--muted);} .topbar .spacer{width:74px;}
  .progress{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:22px;}
  .progress > i{display:block;height:100%;background:var(--teal);width:0;transition:width .4s ease;}
  .card{background:#fffaf0;border:1px solid var(--line);border-radius:20px;padding:28px 24px;
    box-shadow:0 8px 24px rgba(80,60,30,.07);min-height:330px;display:flex;flex-direction:column;}
  .counter{font-size:12px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
  .wordrow{display:flex;align-items:center;gap:14px;}
  .word{font-family:'Fraunces',serif;font-size:44px;font-weight:600;line-height:1.05;letter-spacing:-0.02em;}
  .speaker{flex-shrink:0;width:46px;height:46px;border-radius:50%;border:1.5px solid var(--teal);background:#eaf2f1;
    color:var(--teal);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;}
  .speaker:active{transform:scale(.9);}
  .syl{font-family:'Fraunces',serif;font-size:20px;color:var(--teal);margin-top:10px;letter-spacing:.02em;}
  .pos{display:inline-block;font-style:italic;font-family:'Fraunces',serif;color:var(--muted);font-size:15px;margin-top:4px;}
  .zh{font-size:23px;font-weight:500;margin-top:14px;}
  .ex{margin-top:18px;padding-top:14px;border-top:1px dashed var(--line);}
  .ex-toggle{font-size:13px;color:var(--accent);cursor:pointer;user-select:none;}
  .ex-body{margin-top:10px;display:none;} .ex-body.show{display:block;}
  .ex-body .en{font-family:'Fraunces',serif;font-size:18px;line-height:1.5;} .ex-body .ent{font-size:15px;color:var(--muted);margin-top:6px;}
  .row{display:flex;gap:10px;margin-top:auto;padding-top:22px;}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;transition:transform .08s;}
  .btn:active{transform:scale(.97);} .btn-ghost{background:var(--paper2);color:var(--ink);border:1px solid var(--line);} .btn-main{background:var(--accent);color:#fff;}
  .qhead{font-family:'Fraunces',serif;font-size:30px;font-weight:600;text-align:center;margin:4px 0 2px;line-height:1.3;}
  .qhead.small{font-size:20px;font-family:'Noto Sans TC';font-weight:500;text-align:left;line-height:1.6;}
  .qspeak{text-align:center;margin-bottom:6px;} .qspeak .speaker{display:inline-flex;}
  .qask{text-align:center;color:var(--muted);font-size:14px;margin-bottom:18px;}
  .ctx{background:#f3ece0;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:15px;line-height:1.7;margin-bottom:16px;font-family:'Fraunces',serif;}
  .opt{display:block;width:100%;text-align:left;background:#fffaf0;border:1.5px solid var(--line);border-radius:12px;
    padding:13px 15px;margin-bottom:10px;font-size:16px;font-family:inherit;cursor:pointer;transition:.15s;}
  .opt:hover{border-color:var(--teal);} .opt.correct{border-color:var(--good);background:#e7f3ea;} .opt.wrong{border-color:var(--bad);background:#f7e3df;} .opt:disabled{cursor:default;}
  .fillrow{text-align:center;margin:10px 0 4px;} .fillmask{font-family:'Fraunces',serif;font-size:34px;letter-spacing:4px;}
  .fillin{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:14px;font-size:20px;font-family:'Fraunces',serif;text-align:center;margin-top:14px;}
  .fillin:focus{outline:none;border-color:var(--teal);}
  .feedback{margin-top:14px;font-size:15px;line-height:1.6;padding:12px;border-radius:10px;display:none;}
  .feedback.show{display:block;} .feedback.ok{background:#e7f3ea;color:var(--good);} .feedback.no{background:#f7e3df;color:var(--bad);}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:28px;letter-spacing:.05em;}
  .errbox{background:#f7e3df;border:1px solid var(--bad);border-radius:14px;padding:20px;color:#7a2417;line-height:1.6;font-size:14px;}
  /* home */
  .cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .catcard{border:1.5px solid var(--line);background:#fffaf0;border-radius:16px;padding:18px 14px;text-align:left;cursor:pointer;font-family:inherit;color:var(--ink);transition:.12s;}
  .catcard:hover{border-color:var(--teal);} .catcard .ic{font-size:26px;} .catcard .nm{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:6px;}
  .catcard .ds{font-size:12px;color:var(--muted);margin-top:2px;} .catcard .pr{font-size:12px;color:var(--teal);margin-top:8px;font-weight:500;}
  .catcard.locked{opacity:.55;} .catcard.locked .pr{color:var(--muted);}
  /* category screen */
  .resume{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;width:100%;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;}
  .hint{background:#eaf2f1;border:1px solid #cfe2df;color:#2c5b57;border-radius:12px;padding:11px 14px;font-size:13px;margin:14px 0 18px;line-height:1.5;}
  .setting{margin:4px 0 18px;} .setting .lab{font-size:13px;color:var(--muted);margin-bottom:8px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;} .chip{border:1.5px solid var(--line);background:#fffaf0;border-radius:20px;padding:6px 13px;font-size:14px;font-family:inherit;cursor:pointer;color:var(--ink);} .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .menu-title{font-size:13px;color:var(--muted);margin:6px 0 10px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .daycell{position:relative;border:1.5px solid var(--line);background:#fffaf0;border-radius:14px;padding:13px 6px;text-align:center;cursor:pointer;font-family:inherit;transition:.12s;}
  .daycell:hover{border-color:var(--teal);} .daycell .dn{font-family:'Fraunces',serif;font-size:16px;font-weight:600;} .daycell .st{font-size:11px;color:var(--muted);margin-top:3px;}
  .daycell.done{background:#e7f3ea;border-color:#a8d3ba;} .daycell.done .st{color:var(--good);} .daycell .todaytag{position:absolute;top:-8px;right:-6px;background:var(--teal);color:#fff;font-size:10px;border-radius:10px;padding:1px 7px;}
</style>
</head>
<body>
<div class="wrap">
  <header><div class="brand">每日<span>郵政</span>英文</div><div class="streak" id="streak"></div></header>
  <div class="tally" id="tally"></div>
  <div class="topbar" id="topbar" style="display:none;">
    <button class="menuBtn" id="menuBtn">&#9776; 目錄</button>
    <div class="daylabel"><div class="big" id="dayBig"></div><div class="sub" id="daySub"></div></div>
    <span class="spacer"></span>
  </div>
  <div class="progress" id="progress" style="display:none;"><i id="bar"></i></div>
  <div class="card" id="card"></div>
  <div class="note">© Celia</div>
</div>

<script>
const DEFAULT_WPD=8, DAY_OPTIONS=[6,8,10,12,15], EXAM_ROUNDS=3;
const CATS=[
  {key:"vocab",name:"單字",ic:"📦",ds:"核心高頻字"},
  {key:"grammar",name:"文法",ic:"🔧",ds:"常考句型"},
  {key:"reading",name:"閱讀",ic:"📖",ds:"短文與克漏字"},
  {key:"exam",name:"模擬考",ic:"📝",ds:"綜合實戰"}
];
let ALL=[], GRAMMAR=[], READING=[];
let DAYS=[];
const ONE_DAY=86400000;
let state={startDate:null,wordsPerDay:DEFAULT_WPD,progress:{vocab:{},grammar:{},reading:{},exam:{}}};
let phase="home", curCat=null, viewLevel=0, learnIdx=0;
let quizQ=[], quizIdx=0, quizScore=0, quizCtx=null, answered=false;
const STORE_KEY="dailyEnglishState_v2";

function loadState(){
  try{const s=localStorage.getItem(STORE_KEY);if(s)state=Object.assign(state,JSON.parse(s));}catch(e){}
  if(!state.startDate)state.startDate=Date.now();
  if(!state.wordsPerDay)state.wordsPerDay=DEFAULT_WPD;
  if(!state.progress)state.progress={vocab:{},grammar:{},reading:{},exam:{}};
  for(const c of CATS)if(!state.progress[c.key])state.progress[c.key]={};
  saveState();
}
function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
function speak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.85;speechSynthesis.speak(u);}catch(e){}}
function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}
function normalize(d){return (Array.isArray(d)&&d.length&&Array.isArray(d[0]))?d.flat():d;}

function rechunk(){DAYS=[];const w=state.wordsPerDay;for(let i=0;i<ALL.length;i+=w)DAYS.push(ALL.slice(i,i+w));}

// 每個大類有幾關
function levelCount(cat){
  if(cat==="vocab")return DAYS.length;
  if(cat==="grammar")return Math.ceil(GRAMMAR.length/3);
  if(cat==="reading")return READING.length;
  if(cat==="exam")return (ALL.length&&GRAMMAR.length)?EXAM_ROUNDS:0;
  return 0;
}
function doneCount(cat){return Object.keys(state.progress[cat]||{}).length;}
function currentLevel(cat){ // 第一個還沒完成的關卡
  const n=levelCount(cat);for(let i=0;i<n;i++)if(!state.progress[cat]["L"+i])return i;return n;
}
// 單字關卡的題型:前段選中文→中段拼字母→後段選英文
function vocabFmt(i){return i<2?"zh":i<4?"fill":"en";}
function fmtHint(cat,i){
  if(i>=levelCount(cat))return "這個大類已全部完成,可回去複習任何一關。";
  if(cat==="vocab"){const f=vocabFmt(i);return f==="zh"?"看英文,選出正確的中文意思。":f==="fill"?"聽發音,把單字缺少的字母補上。":"看中文,從相似的英文裡選出正確的字。";}
  if(cat==="grammar")return "先看句型卡,再選出填空的正確答案。";
  if(cat==="reading")return "先熟悉關鍵字,再讀短文用刪去法找答案。";
  if(cat==="exam")return "各種題型混合的小考,練習絕不留白、先刪再猜。";
  return "";
}

async function fetchJSON(name){const r=await fetch(name,{cache:"no-store"});if(!r.ok)throw new Error(name+" "+r.status);return r.json();}
async function init(){
  loadState();
  try{ALL=normalize(await fetchJSON("data.json"));if(!Array.isArray(ALL)||!ALL.length)throw new Error("空");}
  catch(e){document.getElementById("card").innerHTML='<div class="errbox"><b>讀不到 data.json</b><br>'+e.message+'<br><br>請確認 data.json 與本網頁放在同一層,並透過 https 網址開啟。</div>';return;}
  try{GRAMMAR=await fetchJSON("grammar.json");}catch(e){GRAMMAR=[];}
  try{READING=await fetchJSON("reading.json");}catch(e){READING=[];}
  rechunk();phase="home";render();
}

function chrome(){
  const home=(phase==="home");
  document.getElementById("topbar").style.display=home?"none":"flex";
  document.getElementById("progress").style.display=(phase==="learn"||phase==="quiz")?"block":"none";
  let totDone=0;for(const c of CATS)totDone+=doneCount(c.key);
  document.getElementById("streak").textContent="完成 "+totDone+" 關";
  let learned=0;for(const k in state.progress.vocab){const i=parseInt(k.replace("L",""));if(DAYS[i])learned+=DAYS[i].length;}
  document.getElementById("tally").textContent="累積認得 "+learned+" 個單字";
  if(!home){
    const cn=CATS.find(c=>c.key===curCat);
    document.getElementById("dayBig").textContent=(phase==="cat")?cn.name:(cn.name+" · 第 "+(viewLevel+1)+" 關");
    document.getElementById("daySub").textContent=phase==="quiz"?"作答中":phase==="done"?"完成":phase==="learn"?"學習":("共 "+levelCount(curCat)+" 關");
    if(phase==="learn"||phase==="quiz"){
      let pct=phase==="learn"?(DAYS[viewLevel]?learnIdx/DAYS[viewLevel].length*50:0):(quizQ.length?50+quizIdx/quizQ.length*50:50);
      document.getElementById("bar").style.width=pct+"%";
    }
  }
}
function render(){chrome();
  if(phase==="home")renderHome();
  else if(phase==="cat")renderCat();
  else if(phase==="learn")renderLearn();
  else if(phase==="quiz")renderQuiz();
  else if(phase==="done")renderDone();
}

function renderHome(){
  let html='<div class="cats">';
  for(const c of CATS){
    const n=levelCount(c.key),d=doneCount(c.key),locked=n===0;
    html+=`<button class="catcard ${locked?'locked':''}" data-c="${c.key}">
      <div class="ic">${c.ic}</div><div class="nm">${c.name}</div><div class="ds">${c.ds}</div>
      <div class="pr">${locked?'準備中':('完成 '+d+' / '+n+' 關')}</div></button>`;
  }
  html+='</div>';
  const card=document.getElementById("card");card.innerHTML=html;
  card.querySelectorAll(".catcard").forEach(b=>{b.onclick=()=>{
    if(levelCount(b.dataset.c)===0){alert("這個大類的資料還沒上傳,敬請期待。");return;}
    curCat=b.dataset.c;phase="cat";render();};});
}

function renderCat(){
  const n=levelCount(curCat),cur=currentLevel(curCat);
  let html="";
  if(curCat==="vocab"){
    html+='<div class="setting"><div class="lab">每天練幾個字(可隨時調整)</div><div class="chips" id="chips">'+
      DAY_OPTIONS.map(x=>`<button class="chip ${x===state.wordsPerDay?'on':''}" data-n="${x}">${x} 個</button>`).join("")+'</div></div>';
  }
  const allDone=cur>=n;
  html+=`<button class="resume" id="resume">${allDone?'全部完成,複習第 1 關':('繼續挑戰 · 第 '+(cur+1)+' 關')}</button>`;
  html+=`<div class="hint">下一關預告:${fmtHint(curCat,allDone?0:cur)}</div>`;
  html+='<div class="menu-title">所有關卡(可自由前後挑戰)</div><div class="grid" id="grid">';
  for(let i=0;i<n;i++){const rec=state.progress[curCat]["L"+i];
    html+=`<button class="daycell ${rec?'done':''}" data-l="${i}">
      <div class="dn">第 ${i+1} 關</div><div class="st">${rec?('✓ '+rec.score+'/'+rec.total):'未挑戰'}</div></button>`;}
  html+='</div>';
  const card=document.getElementById("card");card.innerHTML=html;
  if(curCat==="vocab")card.querySelectorAll("#chips .chip").forEach(c=>{c.onclick=()=>{state.wordsPerDay=parseInt(c.dataset.n);saveState();rechunk();render();};});
  document.getElementById("resume").onclick=()=>{viewLevel=allDone?0:cur;enterLevel();};
  card.querySelectorAll("#grid .daycell").forEach(c=>{c.onclick=()=>{viewLevel=parseInt(c.dataset.l);enterLevel();};});
}

function enterLevel(){
  if(curCat==="vocab"){phase="learn";learnIdx=0;render();}
  else if(curCat==="grammar"){phase="learn";learnIdx=0;render();}
  else if(curCat==="reading"){const item=READING[viewLevel];if(item.type==="reading"){phase="learn";learnIdx=0;render();}else{buildQuiz();}}
  else if(curCat==="exam"){buildQuiz();}
}

function speakerHTML(){return '<div class="speaker" id="spk">🔊</div>';}

function renderLearn(){
  const card=document.getElementById("card");
  if(curCat==="vocab"){
    const set=DAYS[viewLevel],w=set[learnIdx];
    card.innerHTML=`<div class="counter">單字 ${learnIdx+1} / ${set.length}</div>
      <div class="wordrow"><div class="word">${w.en}</div>${speakerHTML()}</div>
      <div class="syl">${w.syl||""}</div><div class="pos">${w.pos}</div><div class="zh">${w.zh}</div>
      <div class="ex"><span class="ex-toggle" id="extog">&#9656; 看例句</span>
      <div class="ex-body" id="exbody"><div class="en">${w.ex}</div><div class="ent">${w.ext}</div></div></div>
      <div class="row"><button class="btn btn-ghost" id="back">${learnIdx===0?'‹ 返回':'‹ 上一個'}</button>
      <button class="btn btn-main" id="fwd">${learnIdx===set.length-1?'開始測驗 →':'下一個 ›'}</button></div>`;
    document.getElementById("spk").onclick=()=>speak(w.en);speak(w.en);
    const tg=document.getElementById("extog"),bd=document.getElementById("exbody");
    tg.onclick=()=>{bd.classList.toggle("show");tg.innerHTML=bd.classList.contains("show")?"&#9662; 收起例句":"&#9656; 看例句";};
    document.getElementById("back").onclick=()=>{if(learnIdx>0){learnIdx--;render();}else{phase="cat";render();}};
    document.getElementById("fwd").onclick=()=>{if(learnIdx<set.length-1){learnIdx++;render();}else buildQuiz();};
  } else if(curCat==="grammar"){
    const items=GRAMMAR.slice(viewLevel*3,viewLevel*3+3),it=items[learnIdx];
    card.innerHTML=`<div class="counter">句型 ${learnIdx+1} / ${items.length}</div>
      <div class="qhead small"><b>${it.pattern}</b></div>
      <div class="zh" style="font-size:17px">${it.zh}</div>
      <div class="ex"><div class="en" style="font-size:18px">${it.ex}</div><div class="ent">${it.exZh}</div></div>
      <div class="hint" style="margin-top:16px">💡 ${it.note}</div>
      <div class="row"><button class="btn btn-ghost" id="back">${learnIdx===0?'‹ 返回':'‹ 上一個'}</button>
      <button class="btn btn-main" id="fwd">${learnIdx===items.length-1?'開始測驗 →':'下一個 ›'}</button></div>`;
    document.getElementById("back").onclick=()=>{if(learnIdx>0){learnIdx--;render();}else{phase="cat";render();}};
    document.getElementById("fwd").onclick=()=>{if(learnIdx<items.length-1){learnIdx++;render();}else buildQuiz();};
  } else if(curCat==="reading"){
    const item=READING[viewLevel],kw=item.keywords,k=kw[learnIdx];
    card.innerHTML=`<div class="counter">關鍵字 ${learnIdx+1} / ${kw.length}</div>
      <div class="wordrow"><div class="word">${k.en}</div>${speakerHTML()}</div>
      <div class="zh">${k.zh}</div>
      <div class="hint" style="margin-top:18px">先認得這些關鍵字,等下讀短文就有「路標」。</div>
      <div class="row"><button class="btn btn-ghost" id="back">${learnIdx===0?'‹ 返回':'‹ 上一個'}</button>
      <button class="btn btn-main" id="fwd">${learnIdx===kw.length-1?'開始閱讀 →':'下一個 ›'}</button></div>`;
    document.getElementById("spk").onclick=()=>speak(k.en);speak(k.en);
    document.getElementById("back").onclick=()=>{if(learnIdx>0){learnIdx--;render();}else{phase="cat";render();}};
    document.getElementById("fwd").onclick=()=>{if(learnIdx<kw.length-1){learnIdx++;render();}else buildQuiz();};
  }
}

function pickDistract(word,n,similar){
  let others=ALL.filter(x=>x.en!==word.en);
  if(similar)others.sort((a,b)=>((b.en[0]===word.en[0])-(a.en[0]===word.en[0]))||(Math.abs(a.en.length-word.en.length)-Math.abs(b.en.length-word.en.length)));
  const pool=similar?others.slice(0,Math.min(6,others.length)):others;
  return shuffle(pool).slice(0,n);
}
function maskWord(en){
  const ch=en.split("");let idx=ch.map((c,i)=>/[a-z]/i.test(c)?i:-1).filter(i=>i>0&&i<ch.length-1);
  idx=shuffle(idx).slice(0,Math.max(1,Math.round(idx.length*0.5)));
  return ch.map((c,i)=>idx.includes(i)?"_":c).join(" ");
}

function buildQuiz(){
  quizQ=[];quizCtx=null;quizIdx=0;quizScore=0;answered=false;
  if(curCat==="vocab"){
    const set=DAYS[viewLevel],f=vocabFmt(viewLevel);
    for(const w of shuffle(set)){
      if(f==="zh"){const opts=shuffle([w.zh,...pickDistract(w,3,false).map(x=>x.zh)]);
        quizQ.push({kind:"choice",head:w.en,speak:w.en,ask:"這個字的意思是?(可點🔊)",options:opts,answer:w.zh});}
      else if(f==="en"){const opts=shuffle([w.en,...pickDistract(w,3,true).map(x=>x.en)]);
        quizQ.push({kind:"choice",head:w.zh,headSmall:true,ask:"哪一個是正確的英文?",options:opts,answer:w.en});}
      else{quizQ.push({kind:"fill",head:w.zh,speak:w.en,syl:w.syl,answer:w.en});}
    }
  } else if(curCat==="grammar"){
    const items=GRAMMAR.slice(viewLevel*3,viewLevel*3+3);
    for(const it of shuffle(items))quizQ.push({kind:"choice",head:it.q,headSmall:true,ask:"選出正確答案",options:shuffle(it.options.slice()),answer:it.answer,note:it.note});
  } else if(curCat==="reading"){
    const item=READING[viewLevel];
    if(item.type==="reading"){quizCtx=item.passage;for(const q of item.questions)quizQ.push({kind:"choice",head:q.q,headSmall:true,ask:"根據短文選出答案",options:shuffle(q.options.slice()),answer:q.answer});}
    else{quizQ.push({kind:"choice",head:item.text,headSmall:true,ask:"選出最適合填入的字",options:shuffle(item.options.slice()),answer:item.answer,note:item.note});}
  } else if(curCat==="exam"){
    const vs=shuffle(ALL).slice(0,4);for(const w of vs){const opts=shuffle([w.en,...pickDistract(w,3,true).map(x=>x.en)]);quizQ.push({kind:"choice",head:w.zh,headSmall:true,ask:"選出正確的英文",options:opts,answer:w.en});}
    for(const it of shuffle(GRAMMAR).slice(0,3))quizQ.push({kind:"choice",head:it.q,headSmall:true,ask:"選出正確答案",options:shuffle(it.options.slice()),answer:it.answer,note:it.note});
    const cl=READING.filter(r=>r.type==="cloze");if(cl.length){const c=shuffle(cl)[0];quizQ.push({kind:"choice",head:c.text,headSmall:true,ask:"選出最適合填入的字",options:shuffle(c.options.slice()),answer:c.answer,note:c.note});}
    quizQ=shuffle(quizQ);
  }
  phase="quiz";render();
}

function renderQuiz(){
  const card=document.getElementById("card"),q=quizQ[quizIdx];answered=false;
  let html=`<div class="counter">第 ${quizIdx+1} / ${quizQ.length} 題</div>`;
  if(quizCtx)html+=`<div class="ctx">${quizCtx}</div>`;
  html+=`<div class="qhead ${q.headSmall?'small':''}">${q.head}</div>`;
  if(q.speak)html+=`<div class="qspeak">${speakerHTML()}</div>`;
  html+=`<div class="qask">${q.ask}</div>`;
  if(q.kind==="choice"){html+='<div id="opts"></div>';}
  else if(q.kind==="fill"){html+=`<div class="syl" style="text-align:center">${q.syl||""}</div>
    <div class="fillrow"><span class="fillmask">${maskWord(q.answer)}</span></div>
    <input class="fillin" id="fin" placeholder="把完整的字拼出來" autocomplete="off" autocapitalize="off">
    <div class="row"><button class="btn btn-main" id="sub">送出</button></div>`;}
  html+=`<div class="feedback" id="fb"></div>`;
  card.innerHTML=html;
  if(q.speak){document.getElementById("spk").onclick=()=>speak(q.speak);speak(q.speak);}
  const fb=document.getElementById("fb");
  function after(ok){answered=true;quizScore+=ok?1:0;
    fb.className="feedback show "+(ok?"ok":"no");
    fb.innerHTML=(ok?"✓ 答對了!":"✗ 正確答案:<b>"+q.answer+"</b>")+(q.note?"<br>"+q.note:"");
    setTimeout(()=>{if(quizIdx<quizQ.length-1){quizIdx++;render();}else finishLevel();}, q.note?1800:1000);}
  if(q.kind==="choice"){
    const box=document.getElementById("opts");
    q.options.forEach(o=>{const b=document.createElement("button");b.className="opt";b.textContent=o;
      b.onclick=()=>{if(answered)return;document.querySelectorAll(".opt").forEach(x=>x.disabled=true);
        if(o===q.answer)b.classList.add("correct");else{b.classList.add("wrong");document.querySelectorAll(".opt").forEach(x=>{if(x.textContent===q.answer)x.classList.add("correct");});}
        after(o===q.answer);};box.appendChild(b);});
  } else if(q.kind==="fill"){
    const inp=document.getElementById("fin");
    document.getElementById("sub").onclick=()=>{if(answered)return;after(inp.value.trim().toLowerCase()===q.answer.toLowerCase());};
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("sub").click();});
    inp.focus();
  }
}

function finishLevel(){
  phase="done";const total=quizQ.length,prev=state.progress[curCat]["L"+viewLevel];
  if(!prev||quizScore>prev.score){state.progress[curCat]["L"+viewLevel]={score:quizScore,total:total};saveState();}
  render();
}

function renderDone(){
  const total=quizQ.length,rec=state.progress[curCat]["L"+viewLevel]||{score:quizScore,total:total};
  const pass=rec.score>=Math.ceil(total*0.6),n=levelCount(curCat),hasNext=viewLevel<n-1;
  let html=`<div class="counter" style="text-align:center">第 ${viewLevel+1} 關完成</div>
    <div style="text-align:center;padding:14px 0">
    <div style="font-size:52px">${pass?"🎉":"💪"}</div>
    <div style="font-family:'Fraunces';font-size:40px;color:var(--accent);font-weight:600">${rec.score} / ${total}</div>
    <p style="color:var(--muted);margin-top:6px">${pass?"做得好!":"再練一次會更熟。"}</p></div>`;
  html+=`<div class="hint">${hasNext?("下一關預告:"+fmtHint(curCat,viewLevel+1)):"這個大類完成了,回目錄挑戰別的吧!"}</div>`;
  html+=`<div class="row"><button class="btn btn-ghost" id="again">再練一次</button>`;
  html+=hasNext?`<button class="btn btn-main" id="next">下一關 ›</button>`:`<button class="btn btn-main" id="home">回目錄</button>`;
  html+=`</div><div class="row" style="padding-top:10px"><button class="btn btn-ghost" id="cat">回 ${CATS.find(c=>c.key===curCat).name} 關卡列表</button></div>`;
  document.getElementById("card").innerHTML=html;
  document.getElementById("again").onclick=()=>{viewLevel=viewLevel;enterLevel();};
  const nx=document.getElementById("next");if(nx)nx.onclick=()=>{viewLevel++;enterLevel();};
  const hm=document.getElementById("home");if(hm)hm.onclick=()=>{phase="home";render();};
  document.getElementById("cat").onclick=()=>{phase="cat";render();};
}

document.getElementById("menuBtn").onclick=()=>{phase="home";render();};
init();
</script>
</body>
</html>
